let db = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
} catch(e) { console.warn("Firebase non inizializzato:", e.message); }

async function cloudSave(r) {
  if (!db) return false;
  try {
    await db.collection("jump_tests").doc(String(r.id)).set({
      ...r,
      catLabel: r.cat?.label || "N/D",
      catColor: r.cat?.color || "#888",
      cat: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    return true;
  } catch(e) { console.warn("cloudSave:", e.message); return false; }
}

async function cloudLoad() {
  if (!db) return [];
  try {
    const snap = await db.collection("jump_tests").orderBy("createdAt","desc").limit(1000).get();
    return snap.docs.map(d => {
      const r = d.data();
      return { ...r, cat: { label: r.catLabel || "N/D", color: r.catColor || "#888" } };
    });
  } catch(e) { console.warn("cloudLoad:", e.message); return []; }
}

async function cloudDelete(id) {
  if (!db) return false;
  try {
    await db.collection("jump_tests").doc(String(id)).delete();
    return true;
  } catch(e) { console.warn("cloudDelete:", e.message); return false; }
}

async function cloudDeleteMany(ids) {
  if (!db || !ids || ids.length === 0) return false;
  try {
    for (let i = 0; i < ids.length; i += 450) {
      const batch = db.batch();
      ids.slice(i, i + 450).forEach(id => batch.delete(db.collection("jump_tests").doc(String(id))));
      await batch.commit();
    }
    return true;
  } catch(e) { console.warn("cloudDeleteMany:", e.message); return false; }
}
